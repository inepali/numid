<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <!-- Background for contrast (Optional, remove for transparent) -->
  <rect width="512" height="512" rx="112" fill="#0D1117"/>
  
  <defs>
    <!-- Vibrant Tech Gradient -->
    <linearGradient id="tech-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4F46E5" /> <!-- Indigo -->
      <stop offset="100%" stop-color="#06B6D4" /> <!-- Cyan -->
    </linearGradient>
  </defs>

  <!-- The "i" Dot / Digital Node -->
  <circle cx="256" cy="140" r="36" fill="#06B6D4" />

  <!-- The "1" and "i" body combination -->
  <path d="M220 220 H256 V380 H220 M256 220 V380 H292" 
        stroke="url(#tech-grad)" 
        stroke-width="48" 
        stroke-linecap="round" 
        stroke-linejoin="round" 
        fill="none"/>
</svg>
